<head>

<title>Agend — agendamento inteligente</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--primary:#F59E0B;--primary-dark:#D97706;--primary-light:#1C1400;--accent:#FBBF24;--accent-light:#1E1800;--bg:#0A0A0A;--surface:#141414;--surface-alt:#1E1E1E;--text:#F5F5F5;--text-secondary:#9CA3AF;--border:#2A241A;--success:#10B981;--warning:#F59E0B;--error:#EF4444;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);--shadow-lg:0 10px 30px rgba(0,0,0,.5);--glow:0 0 20px rgba(245,158,11,.15)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;background:var(--bg);color:var(--text);line-height:1.6}a{color:inherit;text-decoration:none}

.header{background:rgba(10,10,10,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.inner{max-width:1200px;margin:0 auto;padding:0 1.5rem;height:64px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:1.4rem;font-weight:800;letter-spacing:-.02em;color:var(--text);display:flex;align-items:center;gap:.4rem;cursor:pointer}.logoIcon{color:var(--accent);font-size:1.1rem}

.navLink:hover{background:var(--primary-light);color:var(--accent)}
.profile{display:flex;align-items:center;gap:.5rem;padding:.4rem .8rem;margin-left:.5rem}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--primary);color:#0A0A0A;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:.85rem}
.nome{font-size:.9rem;font-weight:500;color:var(--text)}
.sair{background:none;border:1px solid var(--border);color:var(--text-secondary);padding:.4rem 1rem;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:500;transition:all .2s;font-family:inherit}
.sair:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.ctaBtn{background:var(--primary);color:#0A0A0A;padding:.5rem 1.25rem;border-radius:8px;font-weight:600;font-size:.9rem;transition:all .2s;cursor:pointer;border:none;font-family:inherit}
.ctaBtn:hover{background:var(--primary-dark);transform:translateY(-1px);box-shadow:var(--glow)}
.adminLink{font-size:1.1rem;padding:.4rem .6rem;border-radius:8px;color:var(--text-secondary);opacity:.5;transition:all .2s;margin-left:.25rem;cursor:pointer;background:none;border:none;font-family:inherit}
.adminLink:hover{opacity:1;color:var(--accent);background:var(--primary-light)}

.page{min-height:calc(100vh - 64px)}
.page-center{min-height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center;padding:2rem 1.5rem}

.hero{max-width:1200px;margin:0 auto;padding:4rem 1.5rem;display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center;position:relative}
.hero::before{content:'';position:absolute;top:-20%;left:-10%;width:60%;height:80%;background:radial-gradient(ellipse at center,rgba(245,158,11,.08) 0%,transparent 70%);pointer-events:none}
.heroContent{display:flex;flex-direction:column;gap:1.5rem}
.badge{display:inline-flex;align-items:center;background:var(--primary-light);color:var(--primary);font-size:.8rem;font-weight:600;padding:.35rem 1rem;border-radius:100px;width:fit-content}

.actions{display:flex;gap:.75rem;margin-top:.5rem}
.btnPrimary,.btnSecondary{padding:.75rem 1.75rem;border-radius:var(--radius);font-weight:600;font-size:.95rem;transition:all .2s;cursor:pointer;border:none;font-family:inherit;display:inline-block;text-align:center}
.btnPrimary{background:var(--primary);color:#0A0A0A;box-shadow:0 4px 14px rgba(245,158,11,.3)}

.heroVisual{display:flex;justify-content:center}
.cardDemo{background:var(--surface);border-radius:16px;box-shadow:var(--shadow-lg);width:100%;max-width:380px;overflow:hidden;border:1px solid var(--border)}
.demoHeader{display:flex;gap:6px;padding:1rem 1.25rem;background:var(--bg);border-bottom:1px solid var(--border)}

.lista{display:flex;flex-direction:column;gap:.75rem}
.agCard{display:flex;gap:1rem;padding:1.25rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);transition:all .3s}

.cardInfo{display:flex;flex-wrap:wrap;gap:.25rem 1.25rem;font-size:.88rem;color:var(--text-secondary)}
.preco{font-weight:600;color:var(--text)}
.obs{font-size:.85rem;color:var(--text-secondary);font-style:italic;background:var(--bg);padding:.5rem .75rem;border-radius:6px}
.cardActions{display:flex;gap:.5rem;margin-top:.25rem}
.btnCancelar,.btnReativar{padding:.35rem .9rem;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:.8rem;transition:all .2s;font-family:inherit}
.btnCancelar{background:#2A2A00;color:var(--accent)}.btnCancelar:hover{background:var(--accent);color:#0A0A0A}
.btnReativar{background:#F0FDF4;color:var(--success)}.btnReativar:hover{background:var(--success);color:#fff}
.vazio{text-align:center;padding:4rem 1rem;color:var(--text-secondary)}
.vazioIcon{font-size:2.5rem;color:var(--border);display:block;margin-bottom:.75rem}.vazio p{font-size:1rem}

.novoPage{min-height:calc(100vh - 64px);display:flex;justify-content:center;padding:2rem 1.5rem}
.novoCard{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-lg);width:100%;max-width:600px;padding:2.5rem;border:1px solid var(--border);align-self:flex-start;position:relative}
.novoCard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:var(--radius) var(--radius) 0 0}
.novoHeader{text-align:center;margin-bottom:2rem}
.novoIcon{font-size:2rem;color:var(--primary)}
.novoHeader h1{font-size:1.5rem;margin:.75rem 0 .35rem}

.fields{display:flex;flex-direction:column;gap:1rem}
.row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.opcional{color:var(--text-secondary);font-weight:400}
.field textarea{resize:vertical;min-height:80px}

.meusPage{max-width:700px;margin:0 auto;padding:2rem 1.5rem}
.meusPage h1{font-size:1.75rem;font-weight:700;margin-bottom:2rem}
.meusCard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;transition:all .3s}
.meusCard:hover{box-shadow:var(--glow);border-color:rgba(245,158,11,.2)}
.meusCard:hover{box-shadow:var(--shadow-lg)}
.meusCardHeader{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem;gap:1rem}
.servicoInfo{display:flex;align-items:center;gap:.75rem}
.servicoInfo h3{font-size:1.05rem;font-weight:600}
.tag{font-size:.75rem;font-weight:600;padding:.2rem .7rem;border-radius:100px}
.dataHora{text-align:right;display:flex;flex-direction:column;gap:2px}
.data{font-size:.85rem;color:var(--text-secondary)}
.hora{font-weight:700;color:var(--primary);font-size:1.1rem}
.meusCardBody{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;padding:1rem 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.infoRow{display:flex;flex-direction:column;gap:2px}
.infoRow span{font-size:.8rem;color:var(--text-secondary)}
.infoRow strong{font-size:.95rem}

.adminLoginPage{min-height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center;padding:2rem 1.5rem;background:linear-gradient(135deg,#0F172A 0%,#1E293B 100%)}

.adminPage{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}
.adminLoading{text-align:center;color:var(--text-secondary);padding:4rem}
.adminTop{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem}
.adminTop h1{font-size:1.75rem;font-weight:700}
.adminCards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;margin-bottom:2.5rem}
.adminCard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;border-top:3px solid;display:flex;flex-direction:column;gap:.25rem;transition:all .3s}
.adminCard:hover{box-shadow:var(--glow);border-color:rgba(245,158,11,.2)}
.adminCardValue{font-size:2rem;font-weight:800;color:var(--text)}
.adminCardLabel{font-size:.85rem;color:var(--text-secondary)}
.adminCardLink{font-size:.8rem;color:var(--primary);font-weight:500;margin-top:.5rem;cursor:pointer;background:none;border:none;font-family:inherit;text-align:left;padding:0}
.sectionTitle{font-size:1.2rem;font-weight:600;margin-bottom:1rem}
.tabela{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.tabelaHeader{display:grid;grid-template-columns:1.5fr 1.2fr 1.2fr 1fr 0.6fr 1fr;gap:.5rem;padding:.85rem 1rem;background:var(--bg);font-size:.8rem;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.03em}
.tabelaRow{display:grid;grid-template-columns:1.5fr 1.2fr 1.2fr 1fr 0.6fr 1fr;gap:.5rem;padding:.75rem 1rem;border-top:1px solid var(--border);font-size:.9rem;align-items:center}
.tabelaRow:hover{background:var(--surface-alt)}
.statusTag{font-size:.75rem;font-weight:600;padding:.2rem .6rem;border-radius:100px;width:fit-content}
.btnAcao{padding:.3rem .7rem;border:none;border-radius:6px;font-weight:600;font-size:.75rem;cursor:pointer;transition:all .2s;font-family:inherit}
.btnAcao:hover{filter:brightness(.9)}
.st-agendado{background:#1C1400;color:#FBBF24}.st-confirmado{background:#0F0A2A;color:#A78BFA}.st-cancelado{background:#1A1A1A;color:#9CA3AF}.st-concluido{background:#0A1A0A;color:#34D399}
.adminHeaderBtns{display:flex;gap:.5rem;align-items:center}
.adminSections{display:flex;flex-direction:column;gap:1.5rem}
.adminSection{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .3s}
.adminSection:hover{box-shadow:var(--glow)}
.adminSection{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .2s}
.adminSection:hover{box-shadow:var(--shadow-lg)}
.adminSectionHeader{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.25rem;border-bottom:1px solid var(--border);background:var(--bg)}
.adminSectionHeader h2{font-size:1.05rem;font-weight:600}
.btnExpandir{background:var(--primary);color:#0A0A0A;border:none;padding:.4rem 1rem;border-radius:8px;font-weight:600;font-size:.8rem;cursor:pointer;transition:all .2s;font-family:inherit}
.btnExpandir:hover{background:var(--primary-dark);transform:translateY(-1px)}
.adminSectionBody{padding:1rem 1.25rem}
.modal-overlay{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:1.5rem;animation:fadeIn .2s}

.modal-box{background:var(--surface);border-radius:var(--radius);width:100%;max-width:800px;max-height:85vh;overflow-y:auto;box-shadow:0 25px 50px rgba(0,0,0,.5);animation:scaleIn .2s;border:1px solid var(--border)}

.modal-header{display:flex;justify-content:space-between;align-items:center;padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface-alt);z-index:1}

.modal-header h2{font-size:1.2rem;font-weight:700}

.modal-close{background:var(--surface-alt);border:none;width:36px;height:36px;border-radius:50%;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:all .2s;font-family:inherit}

.modal-close:hover{background:var(--primary-light);color:var(--accent)}
.modal-body{padding:1.5rem}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}

.page-section{display:none}
.page-section.active{display:block}

@media(max-width:768px){
  .hero{grid-template-columns:1fr;gap:2rem;padding:2rem 1.5rem}.hero h1{font-size:2.5rem}.heroVisual{display:none}.features{grid-template-columns:1fr}
  .tabelaHeader,.tabelaRow{grid-template-columns:1fr 1fr;font-size:.8rem}
  .tabelaHeader span:nth-child(n+3),.tabelaRow span:nth-child(n+3){display:none}
}

  .nav{gap:0}.navLink{padding:.4rem .5rem;font-size:.8rem}.profile{display:none}
  .agendaTop{flex-direction:column;align-items:stretch}.agCard{flex-direction:column;gap:.75rem}.time{width:fit-content}
  .row{grid-template-columns:1fr}
  .meusCardBody{grid-template-columns:1fr}.meusCardHeader{flex-direction:column}.dataHora{text-align:left;flex-direction:row;gap:.5rem}
}

<body>

<header class="header" id="app-header">
  <div class="inner">
    <a class="logo" onclick="ir('home')">
      <span class="logoIcon">✦</span> Agend
    </a>
    <nav class="nav">
      <span id="auth-nav" style="display:inline-flex;align-items:center;gap:.35rem"></span>
      <button class="adminLink" onclick="ir('admin-login')" title="Admin">◈</button>
    </nav>
  </div>
</header>

<main id="page-home" class="page-section active"></main>
<main id="page-login" class="page-section"></main>
<main id="page-agenda" class="page-section"></main>
<main id="page-novo" class="page-section"></main>
<main id="page-meus" class="page-section"></main>
<main id="page-admin-login" class="page-section"></main>
<main id="page-admin" class="page-section"></main>
<main id="page-admin-clientes" class="page-section"></main>
<main id="page-admin-agendamentos" class="page-section"></main>
<main id="page-profissional" class="page-section"></main>

<script>
const API='https://trabalho-henrique.onrender.com/api';
const ADMIN_API='/api/admin';
function $(id){return document.getElementById(id)}
function h(t,a,...c){
  const e=document.createElement(t);
  if(a)for(const k in a){
    if(k==='on')for(const ev in a[k])e.addEventListener(ev,a[k][ev]);
    else if(k==='style'&&typeof a[k]==='object')Object.assign(e.style,a[k]);
    else if(k==='html')e.innerHTML=a[k];
    else if(k==='cls')e.className=a[k];
    else e.setAttribute(k,a[k])
  }
  for(const x of c.flat())if(x!=null&&x!==false){
    if(typeof x==='string'||typeof x==='number')e.appendChild(document.createTextNode(x));
    else if(x.nodeType)e.appendChild(x)
  }
  return e
}
async function req(p,o={}){
  const t=localStorage.getItem('token');
  const h={'Content-Type':'application/json',...o.headers};
  if(t)h.Authorization='Bearer '+t;
  const r=await fetch(API+p,{...o,headers:h});
  if(!r.ok){const e=await r.json().catch(()=>({erro:'Erro'}));throw Error(e.erro||'Erro')}
  return r.json()
}
const api={
  getProfissionais:()=>req('/profissionais'),
  getServicos:()=>req('/servicos'),
  createCliente:d=>req('/clientes',{method:'POST',body:JSON.stringify(d)}),
  getAgendamentos:p=>{const q=new URLSearchParams(p).toString();return req('/agendamentos'+(q?'?'+q:''))},
  createAgendamento:d=>req('/agendamentos',{method:'POST',body:JSON.stringify(d)}),
  updateAgendamentoStatus:(i,s)=>req('/agendamentos/'+i+'/status',{method:'PATCH',body:JSON.stringify({status:s})}),

async function aReq(p,o={}){
  const t=localStorage.getItem('adminToken');
  if(!t)throw Error('No token');
  const h={'Content-Type':'application/json',Authorization:'Bearer '+t,...o.headers};
  const r=await fetch(ADMIN_API+p,{...o,headers:h});
  if(r.status===401){localStorage.removeItem('adminToken');localStorage.removeItem('admin');ir('admin-login');throw Error('401')}
  if(!r.ok){const e=await r.json().catch(()=>({erro:'Erro'}));throw Error(e.erro||'Erro')}
  return r.json()
}

paginas['admin-agendamentos']=function(){
  const token=localStorage.getItem('adminToken');
  if(!token){ir('admin-login');return}
  let filtro='';
  const stLabels={agendado:'Agendado',confirmado:'Confirmado',cancelado:'Cancelado',concluido:'Conclu\u00eddo'};
  function getLista(){return filtro?mock.agendamentos.filter(a=>a.status===filtro):mock.agendamentos}
  function renderTabela(){
    const tbl=$('admin-ag-tabela');tbl.innerHTML='';
    tbl.appendChild(h('div',{cls:'tabelaHeader'},h('span',{},'Cliente'),h('span',{},'Profissional'),h('span',{},'Servi\u00e7o'),h('span',{},'Data/Hora'),h('span',{},'Status'),h('span',{},'A\u00e7\u00f5es')));
    getLista().forEach(a=>{
      const row=h('div',{cls:'tabelaRow'},
        h('span',{},h('strong',{},a.cliente_nome),h('br'),h('small',{},a.cliente_email)),
        h('span',{},a.profissional_nome),
        h('span',{},a.servico_nome,h('br'),h('small',{},'R$ '+Number(a.preco).toFixed(2))),
        h('span',{},new Date(a.data+'T12:00:00').toLocaleDateString('pt-BR')+' '+a.hora?.slice(0,5)),
        h('span',{cls:'statusTag st-'+a.status},stLabels[a.status]),
        h('span',{style:{display:'flex',gap:'.35rem',flexWrap:'wrap'}}));
      const acts=row.querySelector('span:last-child');
      if(a.status==='agendado'){
        acts.appendChild(h('button',{cls:'btnAcao',style:{background:'#EEF2FF',color:'#6366F1'},on:{click:function(){a.status='confirmado';renderTabela()}}},'Confirmar'));
        acts.appendChild(h('button',{cls:'btnAcao',style:{background:'#FFF1F2',color:'#F43F5E'},on:{click:function(){a.status='cancelado';renderTabela()}}},'Cancelar'));
      }
      if(a.status==='confirmado')acts.appendChild(h('button',{cls:'btnAcao',style:{background:'#F0FDF4',color:'#22C55E'},on:{click:function(){a.status='concluido';renderTabela()}}},'Concluir'));
      tbl.appendChild(row)
    })
  }
  const page=h('div',{cls:'adminPage'},
    h('div',{cls:'adminTop'},h('h1',{},'Agendamentos'),h('div',{cls:'adminHeaderBtns'},
      h('select',{value:filtro,on:{change:function(e){filtro=e.target.value;renderTabela()}},style:{padding:'.5rem',borderRadius:8,border:'1px solid var(--border)',fontFamily:'inherit'}},
        h('option',{value:''},'Todos'),Object.entries(stLabels).map(([k,v])=>h('option',{value:k},v))),
      h('button',{cls:'sair',style:{background:'#EEF2FF',color:'#6366F1'},on:{click:()=>ir('admin')}},'\u2190 Voltar'))),
    h('div',{cls:'tabela',id:'admin-ag-tabela'},
      h('div',{cls:'tabelaHeader'},h('span',{},'Cliente'),h('span',{},'Profissional'),h('span',{},'Servi\u00e7o'),h('span',{},'Data/Hora'),h('span',{},'Status'),h('span',{},'A\u00e7\u00f5es'))));
  $('page-admin-agendamentos').appendChild(page);
  renderTabela()

          h('div',{cls:'adminSectionBody'},h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:'.75rem'}},

  function criarForm(){
    const f={profissional_id:'',servico_id:'',data:'',hora:'',observacoes:'',erro:''};
    const el=h('form',{cls:'fields',on:{submit:function(e){
      e.preventDefault();f.erro='';
      if(!f.profissional_id||!f.servico_id||!f.data||!f.hora){f.erro='Preencha todos os campos obrigat\u00f3rios';montarForm();return}
      const prof=mock.profissionais.find(p=>p.id==f.profissional_id);
      const serv=mock.servicos.find(s=>s.id==f.servico_id);
      if(!prof||!serv){f.erro='Profissional ou servi\u00e7o inv\u00e1lido';montarForm();return}
      const novo={
        id:Date.now(),cliente_nome:c.nome,cliente_email:c.email,
        profissional_nome:prof.nome,servico_nome:serv.nome,
        preco:serv.preco,data:f.data,hora:f.hora,
        status:'agendado',duracao:serv.duracao,observacoes:f.observacoes

      mock.agendamentos.unshift(novo);

      el.appendChild(h('div',{cls:'row'},
        h('div',{cls:'field'},h('label',{},'Data'),h('input',{type:'date',value:f.data,on:{input:function(e){f.data=e.target.value}},required:true})),
        h('div',{cls:'field'},h('label',{},'Hor\u00e1rio'),h('input',{type:'time',value:f.hora,on:{input:function(e){f.hora=e.target.value}},required:true}))));

      l.appendChild(card)
